{% extends 'base.html' %}

{% block title %}{% if post %}Edit Tulisan{% else %}Tulis Baru{% endif %} — Qata{% endblock %}

{% block content %}
<div class="editor-container">
    <h1>{% if post %}Edit Tulisan{% else %}Tulis Baru{% endif %}</h1>
    <form method="POST">
        <div class="form-group">
            <label for="title">Judul</label>
            <input type="text" id="title" name="title" required autofocus
                   value="{{ post['title'] if post else '' }}">
        </div>
        <div class="form-group">
            <label for="content">Isi Tulisan (Markdown)</label>
            <textarea id="content" name="content" rows="20" required>{{ post['content'] if post else '' }}</textarea>
        </div>
        <div class="editor-footer">
            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status">
                    <option value="draft" {% if not post or post['status'] == 'draft' %}selected{% endif %}>
                        Draf
                    </option>
                    <option value="published" {% if post and post['status'] == 'published' %}selected{% endif %}>
                        Terbit
                    </option>
                </select>
            </div>
            <div class="editor-actions">
                <a href="{{ url_for('dashboard.index') }}" class="btn btn-secondary">Batal</a>
                <button type="submit" class="btn">Simpan</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
