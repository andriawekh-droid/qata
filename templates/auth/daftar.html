{% extends 'base.html' %}

{% block title %}Daftar — Qata{% endblock %}

{% block content %}
<div class="auth-container">
    <h1>Daftar Akun</h1>
    <form method="POST">
        <div class="form-group">
            <label for="invite_code">Kode Undangan</label>
            <input type="text" id="invite_code" name="invite_code" required autofocus>
        </div>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
            <small>Hanya huruf kecil, angka, dan tanda hubung. Minimal 3 karakter.</small>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn">Daftar</button>
    </form>
    <p class="auth-link">Sudah punya akun? <a href="{{ url_for('auth.login') }}">Masuk</a></p>
</div>
{% endblock %}
