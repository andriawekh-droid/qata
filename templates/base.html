<!DOCTYPE html>
<html lang="id" data-theme="{{ page_theme|default('light') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Qata{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=6">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
</head>
<body>
    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <span class="footer-left">Dibuat dengan <a href="{{ url_for('public.index') }}">Qata</a></span>
        {% if current_user.is_authenticated %}
        <a class="footer-right" href="{{ url_for('dashboard.index') }}">Dashboard</a>
        {% endif %}
    </footer>
</body>
</html>
